<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskr — Task Manager</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="header">
    <div class="header__inner">
      <span class="logo">Taskr</span>
      <!-- Live task counter badge -->
      <span class="badge" id="taskCount">0 tasks</span>
    </div>
  </header>

  <!-- ===================== MAIN ===================== -->
  <main class="main">

    <!-- ---- Input Card ---- -->
    <section class="input-card" aria-label="Add a new task">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="What needs to be done?"
        maxlength="120"
        autocomplete="off"
        aria-label="New task text"
      />
      <button id="addBtn" class="btn-add" aria-label="Add task">
        <!-- Plus icon (inline SVG — no dependency) -->
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        Add
      </button>
    </section>

    <!-- ---- Filter Tabs ---- -->
    <nav class="filters" role="tablist" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all"   role="tab" aria-selected="true">All</button>
      <button class="filter-btn"        data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="filter-btn"        data-filter="done"   role="tab" aria-selected="false">Done</button>
    </nav>

    <!-- ---- Task List ---- -->
    <ul class="task-list" id="taskList" aria-live="polite" aria-label="Task list">
      <!-- Tasks are injected here by script.js -->
    </ul>

    <!-- ---- Empty State ---- -->
    <div class="empty-state" id="emptyState" hidden>
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" aria-hidden="true">
        <rect x="8" y="12" width="40" height="36" rx="6" stroke="currentColor" stroke-width="2"/>
        <path d="M18 22h20M18 30h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="44" cy="44" r="10" fill="var(--accent)" />
        <path d="M40 44h8M44 40v8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p>No tasks here yet.<br/>Add one above!</p>
    </div>

    <!-- ---- Footer Actions ---- -->
    <div class="list-footer" id="listFooter" hidden>
      <span id="leftCount" class="left-count"></span>
      <button id="clearDoneBtn" class="btn-clear">Clear completed</button>
    </div>

  </main>

  <!-- Main script -->
  <script src="script.js"></script>
</body>
</html>
